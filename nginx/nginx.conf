# worker_processes — сколько рабочих процессов запустить.
# auto = по числу CPU-ядер. Для отдачи статики и проксирования
# одного процесса обычно хватает, но auto — универсальная настройка.
worker_processes auto;

events {
    # worker_connections — максимум одновременных соединений на один процесс.
    # 1024 — стандартный дефолт, достаточно для сотен пользователей.
    # Не ставим выше без причины — каждое соединение держит дескриптор файла.
    worker_connections 1024;
}

http {

    # include mime.types — загружает таблицу соответствий расширений файлов
    # и Content-Type заголовков. Без этого nginx отдаёт всё как
    # application/octet-stream, и браузер не знает как рендерить HTML, CSS, JS.
    include /etc/nginx/mime.types;

    # default_type — что отдавать если расширение не найдено в mime.types.
    default_type application/octet-stream;

    # sendfile — отдавать файлы через системный вызов sendfile() вместо
    # read() + write(). Это zero-copy: данные идут из файловой системы
    # прямо в сетевой буфер, минуя user-space. Быстрее и меньше CPU.
    sendfile on;

    # keepalive_timeout — сколько секунд держать TCP-соединение открытым
    # после ответа. Браузер делает несколько запросов (HTML, потом JS, CSS...),
    # и переиспользует соединение вместо открытия нового каждый раз.
    # 65 секунд — стандартный дефолт nginx.
    keepalive_timeout 65;

    server {

        # Слушаем порт 80 — стандартный HTTP.
        # Порт 443 (HTTPS) не добавляем: в локальном docker-compose
        # SSL не нужен, это усложнение без пользы.
        # Для продакшна на реальном домене — добавляется отдельно через certbot.
        listen 80;

        # server_name — на какой hostname отвечать.
        # localhost подходит для локальной разработки.
        # На реальном сервере сюда пишешь домен: example.com www.example.com
        server_name localhost;

        # ── Статика (фронт) ────────────────────────────────────────────────

        location / {
            # root — откуда брать файлы. Это путь ВНУТРИ контейнера nginx.
            # Туда мы скопируем frontend/index.html через Dockerfile.
            root /usr/share/nginx/html;

            # index — какой файл отдавать на запрос GET /.
            # Без этого nginx вернёт 403 (forbidden) при обращении к директории.
            index index.html;

            # try_files — пробуем файлы по очереди:
            # $uri — запрошенный путь (например /style.css)
            # $uri/ — как директория (для вложенных маршрутов)
            # /index.html — fallback: если ничего не найдено, отдаём index.html
            # Это нужно для Single Page Application — все маршруты
            # обслуживаются одним HTML-файлом. У нас SPA нет, но практика хорошая.
            try_files $uri $uri/ /index.html;
        }

        # ── Reverse proxy (API) ────────────────────────────────────────────

        # Все запросы начинающиеся с /api/ проксируем на бэкенд.
        # Почему /api/ а не просто передаём /search, /questions и т.д.?
        # Потому что location / уже перехватывает всё. Нужен более специфичный
        # префикс. Альтернатива — перечислять каждый endpoint отдельно,
        # но это хрупко: добавишь новый endpoint в FastAPI — забудешь сюда.
        location /api/ {

            # proxy_pass — куда перенаправить запрос.
            # "backend" — это имя сервиса из docker-compose.yml.
            # Docker автоматически резолвит его в IP контейнера через
            # встроенный DNS. Порт 8000 — тот, что слушает uvicorn.
            # Слеш в конце proxy_pass важен: он убирает префикс /api/ из URL.
            # Запрос GET /api/search → бэкенд получит GET /search
            proxy_pass http://backend:8000/;

            # proxy_set_header — передаём бэкенду информацию о реальном запросе.
            # Без этого FastAPI видит запрос от nginx, а не от браузера.

            # Host — оригинальный хост из запроса браузера.
            proxy_set_header Host $host;

            # X-Real-IP — реальный IP клиента. nginx стоит перед бэком,
            # поэтому без этого заголовка FastAPI видит IP самого nginx (172.x.x.x).
            proxy_set_header X-Real-IP $remote_addr;

            # X-Forwarded-For — стандартный заголовок для цепочки прокси.
            # Логирует путь: IP_клиента, IP_прокси1, IP_прокси2...
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # proxy_read_timeout — сколько ждать ответа от бэкенда.
            # 300 секунд (5 минут) — потому что при первом запуске
            # lifespan грузит модели (sentence-transformers, reranker).
            # Дефолт nginx — 60 секунд — слишком мало, запрос упадёт с 504.
            proxy_read_timeout 300s;

            # proxy_connect_timeout — сколько ждать установки соединения с бэком.
            # 10 секунд достаточно: оба контейнера в одной сети.
            proxy_connect_timeout 10s;
        }
    }
}